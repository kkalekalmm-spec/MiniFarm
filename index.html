<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MineFarm: Dream Life</title>
    <style>
        :root {
            --bg-sky: #87CEEB; --grass: #7cfc00; --dirt: #8B4513;
            --panel: #fdf5e6; --accent: #ff69b4; --border: #5d4037;
        }

        body {
            margin: 0; padding: 0; background: var(--bg-sky);
            font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden;
            user-select: none; touch-action: manipulation;
        }

        /* Stats Bar */
        #top-bar {
            background: rgba(255,255,255,0.9); height: 50px;
            display: flex; justify-content: space-around; align-items: center;
            border-bottom: 3px solid var(--border); font-weight: bold; color: #333;
        }

        /* Main Viewport */
        .view { display: none; height: calc(100vh - 120px); overflow-y: auto; padding: 15px; position: relative; }
        .active-view { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Farm Grid */
        #farm-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            max-width: 400px; margin: 10px auto;
        }
        .tile {
            aspect-ratio: 1/1; background: #55a630; border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            position: relative; border-bottom: 5px solid #2d5a27;
        }
        .tile.tilled { background: var(--dirt); }
        .tile.watered { background: #5d3a1a; box-shadow: inset 0 0 15px #3498db; }
        .tile.pest::after { content: '🐛'; position: absolute; top: 2px; right: 2px; font-size: 12px; }

        /* House Visuals (Cafe Style) */
        #house-display {
            width: 100%; height: 220px; background: #fff; border: 4px solid var(--border);
            border-radius: 20px; position: relative; overflow: hidden;
            background: linear-gradient(to bottom, #a1c4fd 0%, #c2e9fb 100%);
        }
        .house-art { font-size: 100px; text-align: center; margin-top: 40px; }
        .garden-deco { position: absolute; bottom: 10px; width: 100%; display: flex; justify-content: space-around; font-size: 30px; }

        /* Crop Popup */
        #status-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--panel); border: 4px solid var(--border); border-radius: 15px;
            padding: 20px; width: 250px; z-index: 100; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Buttons & UI */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: #fff; border-top: 4px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-btn { font-size: 28px; transition: transform 0.2s; }
        .nav-btn:active { transform: scale(1.2); }

        .btn {
            background: var(--accent); color: white; border: none; padding: 10px 15px;
            border-radius: 10px; font-weight: bold; margin: 5px; box-shadow: 0 4px #c2185b;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #c2185b; }

        .floating-notif {
            position: absolute; pointer-events: none; animation: floatUp 0.8s forwards;
            font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000;
        }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-50px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="top-bar">
        <span>💰 <span id="money">100</span></span>
        <span>⭐ <span id="exp">0</span></span>
    </div>

    <div id="view-farm" class="view active-view">
        <div id="farm-grid"></div>
        <div style="text-align: center; margin-top: 10px;">
            <button class="btn" onclick="useTool('hoe')">⛏️ Cuốc</button>
            <button class="btn" onclick="useTool('water')">💧 Tưới</button>
            <button class="btn" onclick="useTool('spray')">💨 Thuốc</button>
            <button class="btn" onclick="useTool('fert')">🧪 Phân</button>
        </div>
        <p style="text-align: center; font-size: 12px;">Đang dùng: <b id="tool-text">Cuốc</b></p>
    </div>

    <div id="view-home" class="view">
        <div id="house-display">
            <div id="house-icon" class="house-art">⛺</div>
            <div class="garden-deco">🌸🌳⛲</div>
        </div>
        <div style="text-align: center; margin-top: 20px;">
            <h3 id="house-name">Túp lều lý tưởng</h3>
            <p>Bảo Hân's Sweet Home</p>
            <button class="btn" id="upgrade-btn" onclick="upgradeHouse()">Nâng cấp lên Quán Cafe (500💰)</button>
        </div>
    </div>

    <div id="view-shop" class="view">
        <div style="background: white; padding: 15px; border-radius: 15px; border: 3px solid var(--border);">
            <h3>🏪 Chợ Sầm Uất</h3>
            <div id="shop-items"></div>
            <hr>
            <h3>🧺 Bán Nông Sản</h3>
            <div id="sell-items"></div>
        </div>
    </div>

    <div id="view-bag" class="view">
        <div style="background: white; padding: 15px; border-radius: 15px; border: 3px solid var(--border);">
            <h3>🎒 Túi Đồ</h3>
            <div id="bag-list"></div>
        </div>
    </div>

    <div id="status-popup">
        <h3 id="pop-name">Cây trồng</h3>
        <p>Tiến độ: <span id="pop-growth">0</span>%</p>
        <p id="pop-water">💧 Đang khát</p>
        <p id="pop-pest">✅ Bình thường</p>
        <button class="btn" onclick="closePopup()">Đóng</button>
    </div>

    <div class="nav-bar">
        <div class="nav-btn" onclick="showView('farm')">👩‍🌾</div>
        <div class="nav-btn" onclick="showView('home')">🏠</div>
        <div class="nav-btn" onclick="showView('shop')">🏪</div>
        <div class="nav-btn" onclick="showView('bag')">🎒</div>
    </div>

    <script>
        const CROPS = {
            wheat: { name: 'Lúa mì', seed: '🌱', icon: '🌾', cost: 10, sell: 25, time: 5 },
            strawberry: { name: 'Dâu tây', seed: '🧤', icon: '🍓', cost: 30, sell: 80, time: 10 },
            grape: { name: 'Nho tím', seed: '🍇', icon: '🍇', cost: 50, sell: 150, time: 20 },
            sunflower: { name: 'Hướng dương', seed: '🌻', icon: '🌻', cost: 100, sell: 300, time: 30 }
        };

        const HOUSE_LVS = [
            { name: "Túp lều lý tưởng", icon: "⛺", cost: 500 },
            { name: "Nhà gỗ nhỏ", icon: "🏠", cost: 1500 },
            { name: "Tiệm Cafe Sân Vườn", icon: "🏡", cost: 5000 },
            { name: "Biệt thự Dreamy", icon: "🏰", cost: 0 }
        ];

        let game = {
            money: 100, exp: 0, houseLv: 0,
            inv: { wheat_s: 2, strawberry_s: 0, grape_s: 0, sunflower_s: 0 },
            harvest: { wheat: 0, strawberry: 0, grape: 0, sunflower: 0 },
            tiles: Array(16).fill().map(() => ({ type: 'grass', crop: null, g: 0, w: false, p: false, f: false })),
            tool: 'hoe'
        };

        // Khởi tạo
        function init() {
            loadGame();
            renderFarm();
            updateUI();
            setInterval(gameTick, 3000);
        }

        function gameTick() {
            game.tiles.forEach((t, i) => {
                if (t.crop) {
                    if (Math.random() < 0.1) t.p = true;
                    if (t.w && !t.p) {
                        t.g = Math.min(100, t.g + (t.f ? 20 : 10));
                    }
                    if (Math.random() < 0.2) t.w = false;
                }
            });
            renderFarm();
            saveGame();
        }

        function renderFarm() {
            const grid = document.getElementById('farm-grid');
            grid.innerHTML = '';
            game.tiles.forEach((t, i) => {
                const el = document.createElement('div');
                el.className = `tile ${t.type === 'tilled' ? 'tilled' : ''} ${t.w ? 'watered' : ''} ${t.p ? 'pest' : ''}`;
                el.onclick = () => handleTile(i);
                
                if (t.crop) {
                    const c = document.createElement('div');
                    c.style.fontSize = t.g < 100 ? '20px' : '35px';
                    c.style.opacity = t.g < 40 ? '0.5' : '1';
                    c.innerText = t.g < 50 ? CROPS[t.crop].seed : CROPS[t.crop].icon;
                    el.appendChild(c);
                }
                grid.appendChild(el);
            });
        }

        function handleTile(i) {
            let t = game.tiles[i];
            
            // Nếu có cây, ưu tiên hiện bảng thông tin trừ khi đang thu hoạch
            if (t.crop && game.tool !== 'harvest') {
                showPopup(i);
                return;
            }

            if (game.tool === 'hoe' && t.type === 'grass') t.type = 'tilled';
            else if (game.tool === 'water') t.w = true;
            else if (game.tool === 'spray') t.p = false;
            else if (game.tool === 'fert') t.f = true;
            else if (game.tool.endsWith('_s')) {
                let cType = game.tool.split('_')[0];
                if (t.type === 'tilled' && !t.crop && game.inv[game.tool] > 0) {
                    t.crop = cType; t.g = 0; t.w = true;
                    game.inv[game.tool]--;
                }
            }
            else if (t.crop && t.g >= 100) {
                game.harvest[t.crop]++;
                notify(i, `+1 ${CROPS[t.crop].name}`);
                t.crop = null; t.g = 0;
            }
            renderFarm(); updateUI();
        }

        function showPopup(i) {
            let t = game.tiles[i];
            document.getElementById('pop-name').innerText = CROPS[t.crop].name;
            document.getElementById('pop-growth').innerText = t.g;
            document.getElementById('pop-water').innerText = t.w ? "💧 Đã tưới nước" : "🌵 Cần tưới nước!";
            document.getElementById('pop-pest').innerText = t.p ? "🐛 Có sâu bệnh!" : "✅ Cây khỏe mạnh";
            document.getElementById('status-popup').style.display = 'block';
        }

        function upgradeHouse() {
            let next = HOUSE_LVS[game.houseLv];
            if (game.money >= next.cost) {
                game.money -= next.cost;
                game.houseLv++;
                updateUI();
                alert("Chúc mừng Bảo Hân đã nâng cấp nhà thành công! 🎉");
            }
        }

        function updateUI() {
            document.getElementById('money').innerText = game.money;
            document.getElementById('exp').innerText = game.exp;
            let h = HOUSE_LVS[game.houseLv];
            document.getElementById('house-icon').innerText = h.icon;
            document.getElementById('house-name').innerText = h.name;
            document.getElementById('upgrade-btn').innerText = `Nâng cấp (${HOUSE_LVS[game.houseLv].cost}💰)`;
            if (game.houseLv >= 3) document.getElementById('upgrade-btn').style.display = 'none';
            renderShop(); renderBag();
        }

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
            document.getElementById(`view-${id}`).classList.add('active-view');
        }

        function useTool(t) { game.tool = t; document.getElementById('tool-text').innerText = t; }

        function renderShop() {
            let html = '';
            for (let id in CROPS) {
                html += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span>${CROPS[id].icon} Hạt ${CROPS[id].name} (${CROPS[id].cost}💰)</span>
                    <button class="btn" onclick="buy('${id}_s', ${CROPS[id].cost})">Mua</button>
                </div>`;
            }
            document.getElementById('shop-items').innerHTML = html;

            let sellHtml = '';
            for (let id in CROPS) {
                if (game.harvest[id] > 0) {
                    sellHtml += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span>${CROPS[id].icon} ${game.harvest[id]} quả</span>
                        <button class="btn" onclick="sell('${id}', ${CROPS[id].sell})">Bán (+${game.harvest[id]*CROPS[id].sell}💰)</button>
                    </div>`;
                }
            }
            document.getElementById('sell-items').innerHTML = sellHtml || 'Trống...';
        }

        function renderBag() {
            let html = '';
            for (let id in game.inv) {
                if (game.inv[id] > 0) {
                    html += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span>${id} x${game.inv[id]}</span>
                        <button class="btn" onclick="useTool('${id}'); showView('farm')">Gieo</button>
                    </div>`;
                }
            }
            document.getElementById('bag-list').innerHTML = html || 'Túi trống rỗng...';
        }

        function buy(id, price) {
            if (game.money >= price) { game.money -= price; game.inv[id]++; updateUI(); }
        }

        function sell(id, price) {
            game.money += game.harvest[id] * price;
            game.harvest[id] = 0; updateUI();
        }

        function notify(i, text) {
            const el = document.querySelectorAll('.tile')[i];
            const n = document.createElement('div');
            n.className = 'floating-notif';
            n.innerText = text;
            el.appendChild(n);
            setTimeout(() => n.remove(), 800);
        }

        function closePopup() { document.getElementById('status-popup').style.display = 'none'; }
        function saveGame() { localStorage.setItem('minefarm_save', JSON.stringify(game)); }
        function loadGame() {
            let saved = localStorage.getItem('minefarm_save');
            if (saved) game = JSON.parse(saved);
        }

        init();
    </script>
</body>
</html>

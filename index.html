<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MineFarm: Bảo Hân's Adventure</title>
    <style>
        :root {
            --primary: #6ab04c; --dark: #2f3640; --gold: #f1c40f;
            --ui-bg: #f5f6fa; --border: #353b48;
        }

        body {
            margin: 0; padding: 0; background: #87ceeb;
            font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden;
            user-select: none; touch-action: manipulation;
        }

        /* Header & Stats */
        #top-ui {
            background: rgba(0,0,0,0.8); color: white; height: 60px;
            display: flex; justify-content: space-around; align-items: center;
            font-size: 14px; border-bottom: 3px solid var(--gold); z-index: 100;
        }

        /* View Management */
        .view { display: none; height: calc(100vh - 130px); overflow-y: auto; padding: 15px; background: rgba(255,255,255,0.4); }
        .active-view { display: block; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Farm & Fishing Area */
        #farm-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-width: 360px; margin: auto; }
        .tile { aspect-ratio: 1/1; background: #44bd32; border-radius: 6px; border-bottom: 4px solid #2f364022; display: flex; justify-content: center; align-items: center; position: relative; }
        .tile.tilled { background: #714d32; }
        .tile.watered { box-shadow: inset 0 0 12px #00a8ff; border: 1px solid #00a8ff; }
        
        #fishing-zone { 
            height: 200px; background: #0097e6; border-radius: 20px; 
            margin: 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 5px solid white; position: relative; overflow: hidden;
        }
        .water-anim { position: absolute; width: 200%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); animation: wave 3s infinite; }
        @keyframes wave { from { left: -100%; } to { left: 100%; } }

        /* Shop Tabs */
        .shop-tabs { display: flex; overflow-x: auto; gap: 5px; padding-bottom: 10px; }
        .tab-btn { background: white; border: 2px solid var(--border); padding: 5px 12px; border-radius: 15px; white-space: nowrap; font-size: 12px; }
        .tab-btn.active { background: var(--gold); color: black; }

        /* Card & UI Elements */
        .card { background: white; border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 2px solid var(--border); }
        .quest-card { border-left: 8px solid var(--gold); }
        .btn { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; box-shadow: 0 3px #44802c; }
        .btn:active { transform: translateY(2px); box-shadow: none; }

        /* Navigation */
        #nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 4px solid var(--border); }
        .nav-item { font-size: 24px; text-align: center; }
        .nav-item span { display: block; font-size: 10px; color: #666; }

        /* Floating Info */
        .pop-info { position: absolute; animation: fly 1s forwards; color: white; font-weight: bold; text-shadow: 1px 1px 2px black; pointer-events: none; }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }
        
        #fish-alert { font-size: 50px; display: none; position: absolute; z-index: 10; animation: bounce 0.5s infinite; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
    </style>
</head>
<body>

    <div id="top-ui">
        <span>💰 <span id="m-gold">100</span></span>
        <span>⭐ Lv. <span id="m-lvl">1</span></span>
        <span>⚡ <span id="m-nrg">20</span>/20</span>
    </div>

    <div id="v-farm" class="view active-view">
        <div id="farm-grid"></div>
        <div style="margin-top: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px;">
            <button class="btn" onclick="setT('hoe')">⛏️ Cuốc</button>
            <button class="btn" onclick="setT('water')">💧 Tưới</button>
            <button class="btn" onclick="setT('spray')">💨 Thuốc</button>
            <button class="btn" onclick="setT('harvest')">🧺 Thu hoạch</button>
        </div>
        <p style="text-align: center; font-size: 12px; margin-top: 10px;">Đang chọn: <b id="tool-name">Cuốc</b></p>
    </div>

    <div id="v-fish" class="view">
        <div id="fishing-zone" onclick="attemptCatch()">
            <div class="water-anim"></div>
            <div id="fish-alert">❗</div>
            <div id="bobber" style="font-size: 30px;">🎣</div>
            <p id="fish-status" style="color: white; font-weight: bold; margin-top: 10px;">Chạm để quăng cần</p>
        </div>
        <div class="card">
            <h4>Thùng cá của bạn</h4>
            <div id="fish-inv"></div>
        </div>
    </div>

    <div id="v-quest" class="view">
        <h3>📜 Bảng Nhiệm Vụ</h3>
        <div id="quest-list"></div>
    </div>

    <div id="v-shop" class="view">
        <div class="shop-tabs">
            <div class="tab-btn active" onclick="setShop('seed')">🌱 Hạt giống</div>
            <div class="tab-btn" onclick="setShop('food')">🍱 Thức ăn</div>
            <div class="tab-btn" onclick="setShop('tool')">🛠️ Công cụ</div>
            <div class="tab-btn" onclick="setShop('clothes')">👕 Quần áo</div>
        </div>
        <div id="shop-items" style="margin-top: 10px;"></div>
        <hr>
        <div class="card">
            <h4>Bán nông sản & cá</h4>
            <div id="sell-list"></div>
        </div>
    </div>

    <div id="v-bag" class="view">
        <h3>🎒 Hành trang</h3>
        <div id="bag-content"></div>
    </div>

    <div id="nav">
        <div class="nav-item" onclick="showV('farm')">🌾<span>Trại</span></div>
        <div class="nav-item" onclick="showV('fish')">🐟<span>Câu cá</span></div>
        <div class="nav-item" onclick="showV('quest')">📜<span>Nhiệm vụ</span></div>
        <div class="nav-item" onclick="showV('shop')">🏪<span>Chợ</span></div>
        <div class="nav-item" onclick="showV('bag')">🎒<span>Túi</span></div>
    </div>

    <script>
        // DỮ LIỆU GỐC
        const DATA = {
            seeds: {
                wheat: { name: "Lúa mì", price: 10, sell: 25, icon: "🌾", time: 5 },
                corn: { name: "Ngô ngọt", price: 20, sell: 50, icon: "🌽", time: 10 },
                rose: { name: "Hoa hồng", price: 50, sell: 120, icon: "🌹", time: 15 }
            },
            fish: {
                carp: { name: "Cá chép", sell: 40, icon: "🐟" },
                salmon: { name: "Cá hồi", sell: 100, icon: "🍣" },
                shark: { name: "Cá mập", sell: 500, icon: "🦈" }
            },
            shop: {
                food: [ {id: 'bread', name: 'Bánh mì', cost: 15, nrg: 5}, {id: 'juice', name: 'Nước cam', cost: 25, nrg: 10} ],
                clothes: [ {id: 'hat', name: 'Mũ rơm', cost: 100}, {id: 'shirt', name: 'Áo thun hồng', cost: 200} ],
                tool: [ {id: 'rod_1', name: 'Cần câu gỗ', cost: 50}, {id: 'rod_2', name: 'Cần câu xịn', cost: 300} ]
            }
        };

        // TRẠNG THÁI GAME
        let state = {
            money: 100, lvl: 1, exp: 0, nrg: 20,
            inv: { wheat_s: 3, rod_1: 1 },
            storage: { wheat: 0, corn: 0, rose: 0, carp: 0, salmon: 0, shark: 0 },
            tiles: Array(12).fill().map(() => ({ type: 'grass', crop: null, g: 0, w: false, p: false })),
            quests: [
                { id: 1, title: "Khởi nghiệp", desc: "Thu hoạch 3 lúa mì", target: 'wheat', qty: 3, current: 0, reward: 50, done: false },
                { id: 2, title: "Tay câu cừ khôi", desc: "Câu được 2 con cá", target: 'fish_any', qty: 2, current: 0, reward: 80, done: false }
            ],
            curTool: 'hoe',
            shopTab: 'seed',
            fishing: { state: 'idle', timer: null }
        };

        function init() {
            loadGame();
            renderFarm();
            updateUI();
            setInterval(gameTick, 3000);
        }

        // HỆ THỐNG NÔNG TRẠI
        function renderFarm() {
            const grid = document.getElementById('farm-grid');
            grid.innerHTML = '';
            state.tiles.forEach((t, i) => {
                const el = document.createElement('div');
                el.className = `tile ${t.type === 'tilled' ? 'tilled' : ''} ${t.w ? 'watered' : ''}`;
                el.onclick = () => handleTile(i);
                if (t.crop) {
                    el.innerHTML = `<span style="font-size:${t.g >= 100 ? '30px':'20px'}; opacity:${t.g/100+0.3}">${t.g < 50 ? '🌱' : DATA.seeds[t.crop].icon}</span>`;
                }
                grid.appendChild(el);
            });
        }

        function handleTile(i) {
            let t = state.tiles[i];
            if (state.curTool === 'hoe' && t.type === 'grass') t.type = 'tilled';
            else if (state.curTool === 'water') t.w = true;
            else if (state.curTool.endsWith('_s')) {
                let s = state.curTool.split('_')[0];
                if (t.type === 'tilled' && !t.crop && state.inv[state.curTool] > 0) {
                    t.crop = s; t.g = 0; state.inv[state.curTool]--;
                }
            }
            else if (state.curTool === 'harvest' && t.crop && t.g >= 100) {
                state.storage[t.crop]++;
                checkQuests(t.crop, 1);
                t.crop = null; t.g = 0; t.w = false;
                spawnFloat(i, "Thu hoạch!");
            }
            renderFarm(); updateUI();
        }

        // HỆ THỐNG CÂU CÁ
        function attemptCatch() {
            const alert = document.getElementById('fish-alert');
            const status = document.getElementById('fish-status');
            
            if (state.fishing.state === 'idle') {
                if (!state.inv.rod_1 && !state.inv.rod_2) { alert("Mua cần câu đã bà ơi!"); return; }
                state.fishing.state = 'waiting';
                status.innerText = "Đang chờ cá cắn câu...";
                let waitTime = 2000 + Math.random() * 4000;
                state.fishing.timer = setTimeout(() => {
                    state.fishing.state = 'bite';
                    alert.style.display = 'block';
                    status.innerText = "GIẬT NGAY!!!";
                    // Phải giật trong vòng 1s
                    state.fishing.timer = setTimeout(() => {
                        if (state.fishing.state === 'bite') resetFish("Hụt rồi!");
                    }, 1000);
                }, waitTime);
            } else if (state.fishing.state === 'bite') {
                clearTimeout(state.fishing.timer);
                let fishTypes = Object.keys(DATA.fish);
                let caught = fishTypes[Math.floor(Math.random() * fishTypes.length)];
                state.storage[caught]++;
                checkQuests('fish_any', 1);
                resetFish(`Bắt được ${DATA.fish[caught].name}! ${DATA.fish[caught].icon}`);
            }
        }

        function resetFish(txt) {
            document.getElementById('fish-alert').style.display = 'none';
            document.getElementById('fish-status').innerText = txt;
            state.fishing.state = 'idle';
            updateUI();
        }

        // NHIỆM VỤ
        function checkQuests(id, qty) {
            state.quests.forEach(q => {
                if (!q.done && (q.target === id || q.target === 'fish_any')) {
                    q.current += qty;
                    if (q.current >= q.qty) {
                        q.done = true; state.money += q.reward;
                        alert(`Xong nhiệm vụ: ${q.title}! Nhận ${q.reward}💰`);
                    }
                }
            });
        }

        function renderQuests() {
            const list = document.getElementById('quest-list');
            list.innerHTML = state.quests.map(q => `
                <div class="card quest-card" style="opacity: ${q.done ? 0.5 : 1}">
                    <h4>${q.title} ${q.done ? '✅' : ''}</h4>
                    <p>${q.desc}</p>
                    <small>Tiến độ: ${q.current}/${q.qty}</small>
                </div>
            `).join('');
        }

        // CỬA HÀNG & TÚI ĐỒ
        function setShop(tab) { state.shopTab = tab; renderShop(); }

        function renderShop() {
            const list = document.getElementById('shop-items');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            let html = '';
            
            if (state.shopTab === 'seed') {
                for (let id in DATA.seeds) {
                    html += `<div class="card" style="display:flex; justify-content:space-between">
                        <span>${DATA.seeds[id].icon} ${DATA.seeds[id].name} (${DATA.seeds[id].price}💰)</span>
                        <button class="btn" onclick="buy('${id}_s', ${DATA.seeds[id].price})">Mua</button>
                    </div>`;
                }
            } else {
                DATA.shop[state.shopTab].forEach(item => {
                    html += `<div class="card" style="display:flex; justify-content:space-between">
                        <span>${item.name} (${item.cost}💰)</span>
                        <button class="btn" onclick="buy('${item.id}', ${item.cost})">Mua</button>
                    </div>`;
                });
            }
            list.innerHTML = html;
            
            // Sell list
            let sHtml = '';
            for (let id in state.storage) {
                if (state.storage[id] > 0) {
                    let price = DATA.seeds[id] ? DATA.seeds[id].sell : DATA.fish[id].sell;
                    sHtml += `<div class="card" style="display:flex; justify-content:space-between">
                        <span>${id} x${state.storage[id]}</span>
                        <button class="btn" onclick="sell('${id}', ${price})">Bán hết (+${state.storage[id]*price})</button>
                    </div>`;
                }
            }
            document.getElementById('sell-list').innerHTML = sHtml || 'Chưa có gì để bán';
        }

        function renderBag() {
            const bag = document.getElementById('bag-content');
            let html = '';
            for (let id in state.inv) {
                if (state.inv[id] > 0) {
                    html += `<div class="card" style="display:flex; justify-content:space-between">
                        <span>${id} x${state.inv[id]}</span>
                        <button class="btn" onclick="setT('${id}'); showV('farm')">Dùng</button>
                    </div>`;
                }
            }
            bag.innerHTML = html || 'Túi trống';
        }

        // LOGIC CHUNG
        function gameTick() {
            state.tiles.forEach(t => { if (t.crop && t.w && t.g < 100) t.g += 10; });
            renderFarm(); saveGame();
        }

        function showV(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
            document.getElementById('v-'+id).classList.add('active-view');
            if(id === 'quest') renderQuests();
            if(id === 'shop') renderShop();
            if(id === 'bag') renderBag();
        }

        function setT(t) { state.curTool = t; document.getElementById('tool-name').innerText = t; }

        function buy(id, price) {
            if (state.money >= price) { 
                state.money -= price; 
                state.inv[id] = (state.inv[id] || 0) + 1; 
                updateUI(); renderShop(); 
            }
        }

        function sell(id, price) {
            state.money += state.storage[id] * price;
            state.storage[id] = 0; updateUI(); renderShop();
        }

        function updateUI() {
            document.getElementById('m-gold').innerText = state.money;
            document.getElementById('m-lvl').innerText = state.lvl;
            document.getElementById('m-nrg').innerText = state.nrg;
        }

        function spawnFloat(i, txt) {
            const tiles = document.querySelectorAll('.tile');
            const f = document.createElement('div');
            f.className = 'pop-info'; f.innerText = txt;
            tiles[i].appendChild(f);
            setTimeout(() => f.remove(), 1000);
        }

        function saveGame() { localStorage.setItem('minefarm_pro_save', JSON.stringify(state)); }
        function loadGame() {
            let s = localStorage.getItem('minefarm_pro_save');
            if (s) state = JSON.parse(s);
        }

        init();
    </script>
</body>
</html>

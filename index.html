<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MineFarm Pro: Ultimate Edition</title>
    <style>
        :root {
            --mc-dirt: #866043; --mc-grass: #507d32; --mc-farm: #4a3222;
            --mc-sky: #72a7ff; --mc-ui: #c6c6c6; --mc-border: #373737;
        }

        body {
            margin: 0; padding: 0; background: var(--mc-sky);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; touch-action: manipulation; user-select: none;
        }

        /* Header & Stats */
        #header {
            background: rgba(0,0,0,0.7); color: white; padding: 10px;
            display: flex; justify-content: space-around; font-weight: bold;
        }

        /* Main Screen Management */
        .screen { display: none; height: calc(100vh - 120px); overflow-y: auto; padding: 15px; }
        .active-screen { display: block; }

        /* Farm Grid */
        #farm-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
            max-width: 400px; margin: 0 auto;
        }
        .tile {
            aspect-ratio: 1/1; background: var(--mc-grass); border-radius: 4px;
            position: relative; display: flex; justify-content: center; align-items: center;
            border-bottom: 4px solid rgba(0,0,0,0.2);
        }
        .tile.tilled { background: var(--mc-farm); }
        .tile.watered { border: 2px solid #2ecc71; box-shadow: inset 0 0 10px #3498db; }
        .tile.has-pest::after { content: '🐛'; position: absolute; top: 0; right: 0; font-size: 14px; }

        /* Crop Visuals */
        .crop { font-size: 30px; transition: transform 0.3s; }
        .growth-0 { transform: scale(0.3); opacity: 0.6; }
        .growth-1 { transform: scale(0.6); }
        .growth-2 { transform: scale(1); }

        /* UI Elements */
        .card { background: white; border: 3px solid var(--mc-border); padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        .btn { 
            background: #7e7e7e; color: white; border: 2px solid #000; padding: 8px; 
            text-align: center; cursor: pointer; margin: 2px;
        }
        .btn:active { background: #444; }

        /* Navigation Bottom */
        #navbar {
            position: fixed; bottom: 0; width: 100%; height: 65px;
            background: var(--mc-ui); border-top: 4px solid var(--mc-border);
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-item { font-size: 24px; padding: 10px; }

        /* Floating Text */
        .floating {
            position: absolute; color: white; font-weight: bold;
            text-shadow: 1px 1px 2px black; animation: rise 1s forwards;
        }
        @keyframes rise { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-40px); } }

        /* Inventory & Shop Lists */
        .item-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 8px 0; }
    </style>
</head>
<body>

    <div id="header">
        <span>💰 <span id="money">100</span></span>
        <span>🌟 LV. <span id="level">1</span></span>
    </div>

    <div id="screen-farm" class="screen active-screen">
        <div id="farm-grid"></div>
        <div style="margin-top: 15px; display: flex; flex-wrap: wrap; justify-content: center;">
            <button class="btn" onclick="setTool('hoe')">⛏️ Cuốc</button>
            <button class="btn" onclick="setTool('water')">💧 Tưới</button>
            <button class="btn" onclick="setTool('spray')">💨 Thuốc sâu</button>
            <button class="btn" onclick="setTool('fert')">🧪 Phân bón</button>
        </div>
        <p style="text-align: center; font-size: 0.8rem;">Đang dùng: <b id="current-tool">Chưa chọn</b></p>
    </div>

    <div id="screen-inv" class="screen">
        <h3>🎒 Túi đồ của bà</h3>
        <div id="inventory-list"></div>
    </div>

    <div id="screen-shop" class="screen">
        <h3>🏪 Chợ Pixel</h3>
        <div class="card">
            <h4>Mua Hạt Giống</h4>
            <div id="shop-seeds"></div>
        </div>
        <div class="card">
            <h4>Bán Nông Sản</h4>
            <div id="shop-sell"></div>
        </div>
    </div>

    <div id="screen-home" class="screen">
        <div class="card" style="text-align: center;">
            <div style="font-size: 50px;">🏠</div>
            <h3>Nhà của Bảo Hân</h3>
            <p>Cấp độ nhà: <span id="house-lv">1</span></p>
            <button class="btn" onclick="upgradeHouse()">Nâng cấp nhà (500💰)</button>
        </div>
        <div class="card">
            <h4>Trang trí & Tiện ích</h4>
            <p>🛏️ Giường ngủ: Hồi phục năng lượng (Sắp ra mắt)</p>
            <p>📦 Thùng chứa: Tăng sức chứa kho</p>
        </div>
    </div>

    <div id="navbar">
        <div class="nav-item" onclick="showScreen('farm')">🌾</div>
        <div class="nav-item" onclick="showScreen('inv')">🎒</div>
        <div class="nav-item" onclick="showScreen('shop')">🏪</div>
        <div class="nav-item" onclick="showScreen('home')">🏠</div>
    </div>

    <script>
        // DỮ LIỆU GAME
        const cropsData = {
            wheat: { name: 'Lúa mì', icon: '🌾', price: 10, sell: 25, time: 5000 },
            carrot: { name: 'Cà rốt', icon: '🥕', price: 25, sell: 60, time: 8000 },
            pumpkin: { name: 'Bí ngô', icon: '🎃', price: 50, sell: 150, time: 15000 }
        };

        let state = {
            money: 100,
            level: 1,
            houseLv: 1,
            inventory: { wheat_seed: 3, carrot_seed: 0, pumpkin_seed: 0, wheat: 0, carrot: 0, pumpkin: 0 },
            currentTool: 'hoe',
            tiles: Array(16).fill().map(() => ({ 
                type: 'grass', crop: null, growth: 0, watered: false, pest: false, fertilized: false 
            }))
        };

        // KHỞI TẠO
        function init() {
            renderFarm();
            updateUI();
            // Loop kiểm tra sâu bệnh & khô nước
            setInterval(gameTick, 4000);
        }

        function renderFarm() {
            const grid = document.getElementById('farm-grid');
            grid.innerHTML = '';
            state.tiles.forEach((tile, i) => {
                const el = document.createElement('div');
                el.className = `tile ${tile.type === 'tilled' ? 'tilled' : ''} ${tile.watered ? 'watered' : ''} ${tile.pest ? 'has-pest' : ''}`;
                el.onclick = () => handleTileClick(i);
                
                if (tile.crop) {
                    const cropEl = document.createElement('div');
                    cropEl.className = `crop growth-${tile.growth}`;
                    cropEl.innerText = cropsData[tile.crop].icon;
                    el.appendChild(cropEl);
                }
                grid.appendChild(el);
            });
        }

        function handleTileClick(i) {
            let t = state.tiles[i];
            
            if (state.currentTool === 'hoe' && t.type === 'grass') {
                t.type = 'tilled';
            } 
            else if (state.currentTool === 'water' && t.type === 'tilled') {
                t.watered = true;
            }
            else if (state.currentTool === 'spray' && t.pest) {
                t.pest = false;
                showFloating(i, "Sạch sâu!");
            }
            else if (state.currentTool === 'fert' && t.crop && !t.fertilized) {
                t.fertilized = true;
                showFloating(i, "Lớn nhanh!");
            }
            else if (state.currentTool.includes('_seed')) {
                let seedType = state.currentTool.split('_')[0];
                if (t.type === 'tilled' && !t.crop && state.inventory[state.currentTool] > 0) {
                    t.crop = seedType;
                    t.growth = 0;
                    state.inventory[state.currentTool]--;
                    startGrowth(i);
                }
            }
            else if (t.crop && t.growth === 2) {
                // Thu hoạch
                state.inventory[t.crop]++;
                showFloating(i, `+1 ${cropsData[t.crop].name}`);
                t.crop = null; t.growth = 0; t.watered = false; t.fertilized = false;
            }

            renderFarm();
            updateUI();
        }

        function startGrowth(i) {
            let t = state.tiles[i];
            const grow = () => {
                if (!t.crop) return;
                if (t.pest) { setTimeout(grow, 2000); return; } // Bị sâu thì ngừng lớn
                
                if (t.growth < 2) {
                    t.growth++;
                    renderFarm();
                    let nextTime = cropsData[t.crop].time;
                    if (t.fertilized) nextTime /= 2;
                    setTimeout(grow, nextTime);
                }
            };
            setTimeout(grow, cropsData[t.crop].time);
        }

        function gameTick() {
            state.tiles.forEach(t => {
                if (t.crop) {
                    if (Math.random() < 0.1) t.pest = true; // 10% bị sâu
                    if (Math.random() < 0.2) t.watered = false; // 20% bị khô đất
                }
            });
            renderFarm();
        }

        // HỆ THỐNG UI & MÀN HÌNH
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(`screen-${id}`).classList.add('active-screen');
            if(id === 'inv') renderInventory();
            if(id === 'shop') renderShop();
        }

        function setTool(tool) {
            state.currentTool = tool;
            document.getElementById('current-tool').innerText = tool;
        }

        function updateUI() {
            document.getElementById('money').innerText = state.money;
            document.getElementById('level').innerText = state.level;
            document.getElementById('house-lv').innerText = state.houseLv;
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = '';
            for (let item in state.inventory) {
                if (state.inventory[item] > 0) {
                    const row = document.createElement('div');
                    row.className = 'item-row card';
                    row.innerHTML = `<span>${item.replace('_', ' ')} x${state.inventory[item]}</span>`;
                    if (item.includes('_seed')) {
                        const btn = document.createElement('button');
                        btn.className = 'btn';
                        btn.innerText = 'Sử dụng';
                        btn.onclick = () => { setTool(item); showScreen('farm'); };
                        row.appendChild(btn);
                    }
                    list.appendChild(row);
                }
            }
        }

        function renderShop() {
            const sDiv = document.getElementById('shop-seeds');
            sDiv.innerHTML = '';
            for (let id in cropsData) {
                sDiv.innerHTML += `
                    <div class="item-row">
                        <span>${cropsData[id].icon} Hạt ${cropsData[id].name} (${cropsData[id].price}💰)</span>
                        <button class="btn" onclick="buyItem('${id}_seed', ${cropsData[id].price})">Mua</button>
                    </div>`;
            }

            const sellDiv = document.getElementById('shop-sell');
            sellDiv.innerHTML = '';
            for (let id in cropsData) {
                if (state.inventory[id] > 0) {
                    sellDiv.innerHTML += `
                        <div class="item-row">
                            <span>${cropsData[id].icon} ${cropsData[id].name} (Giá: ${cropsData[id].sell}💰)</span>
                            <button class="btn" onclick="sellItem('${id}', ${cropsData[id].sell})">Bán hết</button>
                        </div>`;
                }
            }
        }

        function buyItem(id, price) {
            if (state.money >= price) {
                state.money -= price;
                state.inventory[id]++;
                updateUI(); renderShop();
            } else { alert("Hết tiền rồi bà ơi!"); }
        }

        function sellItem(id, price) {
            state.money += state.inventory[id] * price;
            state.inventory[id] = 0;
            updateUI(); renderShop();
        }

        function upgradeHouse() {
            if (state.money >= 500) {
                state.money -= 500;
                state.houseLv++;
                updateUI();
                alert("Nhà bà xịn hơn rồi đó!");
            }
        }

        function showFloating(i, text) {
            const tiles = document.querySelectorAll('.tile');
            const float = document.createElement('div');
            float.className = 'floating';
            float.innerText = text;
            tiles[i].appendChild(float);
            setTimeout(() => float.remove(), 1000);
        }

        init();
    </script>
</body>
</html>

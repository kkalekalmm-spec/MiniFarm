<!DOCTYPE html>  
<html lang="vi">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
<title>MineFarm: Pro Max Ultra Edition</title>  

<style>  
:root{  
--primary:#4cd137;  
--bg:#f5f6fa;  
--dark:#2f3640;  
--gold:#fbc531;  
--danger:#e84118;  
--blue:#00a8ff;  
--cozy-1:#6f4e37;  
--night-bg: #1a1a2e;  
}  

*{box-sizing:border-box}  

body{  
margin:0;  
padding:0;  
background:linear-gradient(180deg,#79c7ff 0%,#dff3ff 32%,#f4efe6 100%);  
font-family:'Segoe UI',sans-serif;  
overflow:hidden;  
user-select:none;  
touch-action:manipulation;  
}  

#stat-bar{  
background:rgba(31,24,20,.9);  
color:#fff;  
height:66px;  
display:flex;  
justify-content:space-around;  
align-items:center;  
border-bottom:4px solid var(--gold);  
font-size:13px;  
position: sticky;  
top: 0;  
z-index: 100;  
}  

.view{ display:none; height:calc(100vh - 136px); overflow-y:auto; padding:14px;}  
.active-view{ display:block;}  

.card{  
background:#fff;  
border-radius:18px;  
padding:14px;  
margin-bottom:12px;  
}  

.btn{  
background:var(--primary);  
color:#fff;  
border:none;  
padding:10px 14px;  
border-radius:12px;  
font-weight:700;  
}  

/* PASSAGE EFFECT */  
.passage{  
animation: passageFade .4s ease;  
}  
@keyframes passageFade{  
from{opacity:0;transform:translateX(40px)}  
to{opacity:1;transform:translateX(0)}  
}  

.home-bg{  
background:#fdf0d5;  
border:10px solid #6f4e37;  
height:200px;  
border-radius:20px;  
display:flex;  
align-items:center;  
justify-content:center;  
font-size:50px;  
margin-bottom:20px;  
cursor:pointer;  
}  

nav{  
position:fixed;  
bottom:0;  
width:100%;  
height:70px;  
background:#fff;  
display:flex;  
justify-content:space-around;  
align-items:center;  
border-top:3px solid var(--dark);  
}  
</style>  
</head>  

<body>  

<div id="stat-bar">  
<span>📅 Ngày <span id="m-day">1</span></span>  
<span>💰 <span id="m-gold">150</span></span>  
<span>⚡ <span id="m-nrg">30</span>/30</span>  
</div>  

<!-- FARM -->  
<div id="v-farm" class="view active-view passage">  
<div class="card">  
<h3>🌱 Khu vườn</h3>  
<button class="btn" onclick="enterHome()">🚪 Vào nhà</button>  
</div>  
</div>  

<!-- HOME -->  
<div id="v-home" class="view passage">  
<div class="home-bg">🏠</div>  

<div class="card">  
<h3>Nhà của bạn</h3>  
<p>Nơi nghỉ ngơi.</p>  

<button class="btn" onclick="exitHome()">🚪 Rời nhà</button>  

<button class="btn" onclick="handleSleep()">😴 Ngủ</button>  
</div>  
</div>  

<nav>  
<div onclick="showV('farm')">🌱</div>  
<div onclick="showV('home')">🏠</div>  
</nav>  

<script>  

let state = {  
day:1, gold:150, nrg:30  
};  

function updateStats(){  
document.getElementById('m-day').innerText=state.day;  
document.getElementById('m-gold').innerText=state.gold;  
document.getElementById('m-nrg').innerText=state.nrg;  
}  

function showV(v){  
document.querySelectorAll('.view').forEach(el=>{  
el.classList.remove('active-view');  
});  

const target=document.getElementById('v-'+v);  
target.classList.add('active-view');  

// reset animation  
target.classList.remove('passage');  
void target.offsetWidth;  
target.classList.add('passage');  
}  

/* ===== NEW FEATURE: HOUSE PASSAGE ===== */  

function enterHome(){  
showV('home');  
}  

function exitHome(){  
showV('farm');  
}  

/* ===== SLEEP ===== */  

function handleSleep(){  
state.day++;  
state.nrg=30;  
updateStats();  
alert("Ngày mới!");  
}  

updateStats();  

</script>  

</body>  
</html>

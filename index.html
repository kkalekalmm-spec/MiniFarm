<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MineFarm: Pro Max Edition</title>
    <style>
        :root {
            --primary: #4cd137; --bg: #f5f6fa; --dark: #2f3640; --gold: #fbc531; --danger: #e84118;
        }

        body {
            margin: 0; padding: 0; background: #74b9ff;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            user-select: none; touch-action: manipulation;
        }

        /* Top UI */
        #stat-bar {
            background: rgba(0,0,0,0.85); color: white; height: 65px;
            display: flex; justify-content: space-around; align-items: center;
            border-bottom: 4px solid var(--gold); font-size: 14px;
        }

        .view { display: none; height: calc(100vh - 135px); overflow-y: auto; padding: 15px; background: rgba(255,255,255,0.2); }
        .active-view { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Farm Grid */
        #farm-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 380px; margin: auto; }
        .tile { 
            aspect-ratio: 1/1; background: #44bd32; border-radius: 10px; 
            border-bottom: 5px solid #2d5a27; position: relative;
            display: flex; justify-content: center; align-items: center;
        }
        .tile.tilled { background: #825a2c; }
        .tile.watered { border: 2px solid #00a8ff; box-shadow: inset 0 0 15px #00a8ff; }
        .tile.pest::after { content: '🐛'; position: absolute; top: 5px; right: 5px; font-size: 12px; }

        /* Fishing Minigame 2.0 */
        #fish-area {
            height: 250px; background: #0097e6; border-radius: 20px;
            border: 5px solid white; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }
        #fish-bar-container {
            width: 80%; height: 20px; background: #2f3640; border-radius: 10px; 
            margin-top: 20px; position: relative; display: none;
        }
        #fish-target { position: absolute; height: 100%; width: 20%; background: #4cd137; left: 40%; border-radius: 10px; }
        #fish-pointer { position: absolute; height: 100%; width: 5px; background: white; left: 0%; transition: left 0.1s; }

        /* Common Elements */
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 2px solid var(--dark); }
        .btn { 
            background: var(--primary); color: white; border: none; padding: 10px 15px;
            border-radius: 10px; font-weight: bold; box-shadow: 0 4px #44802c;
        }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        .btn-tool { position: relative; padding-bottom: 15px; }
        .durability { position: absolute; bottom: 2px; left: 10%; width: 80%; height: 4px; background: #ddd; border-radius: 2px; }
        .dur-fill { height: 100%; background: var(--primary); border-radius: 2px; }

        /* Inventory List */
        .item-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; }

        /* Popup */
        #info-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border: 4px solid var(--dark); border-radius: 20px;
            padding: 20px; z-index: 1000; display: none; width: 280px;
        }

        /* Nav */
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 4px solid var(--dark); }
        .nav-item { font-size: 24px; text-align: center; }
        .nav-item span { display: block; font-size: 10px; font-weight: bold; }

        .shop-tabs { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 10px; }
        .tab { background: #eee; padding: 5px 12px; border-radius: 10px; font-size: 12px; white-space: nowrap; }
        .tab.active { background: var(--gold); }
    </style>
</head>
<body>

    <div id="stat-bar">
        <span>💰 <span id="m-gold">100</span></span>
        <span>⚡ <span id="m-nrg">30</span>/30</span>
        <span>⭐ Lv. <span id="m-lvl">1</span></span>
    </div>

    <div id="v-farm" class="view active-view">
        <div id="farm-grid"></div>
        <div style="margin-top: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;">
            <button class="btn btn-tool" onclick="selectT('hoe')">⛏️ Cuốc <div class="durability"><div id="dur-hoe" class="dur-fill"></div></div></button>
            <button class="btn" onclick="selectT('water')">💧 Tưới</button>
            <button class="btn" onclick="selectT('harvest')">🧺 Thu hoạch</button>
        </div>
        <p style="text-align: center; font-size: 12px; margin-top: 8px;">Đang cầm: <b id="cur-tool-name">Cuốc</b></p>
    </div>

    <div id="v-fish" class="view">
        <div id="fish-area" onclick="handleFishClick()">
            <div id="fish-alert" style="font-size: 60px; display: none; animation: bounce 0.4s infinite;">❗</div>
            <div id="bobber" style="font-size: 40px;">🎣</div>
            <p id="fish-hint" style="color: white; font-weight: bold;">Chạm để thả mồi</p>
            
            <div id="fish-bar-container">
                <div id="fish-target"></div>
                <div id="fish-pointer"></div>
            </div>
        </div>
        <div class="card" style="margin-top: 15px;">
            <h4>Cần câu của bạn:</h4>
            <div id="rod-status" class="item-row">Chưa có cần câu</div>
        </div>
    </div>

    <div id="v-shop" class="view">
        <div class="shop-tabs">
            <div class="tab active" onclick="switchShop('seed')">🌱 Hạt</div>
            <div class="tab" onclick="switchShop('food')">🍔 Đồ ăn</div>
            <div class="tab" onclick="switchShop('tool')">🛠️ Đồ nghề</div>
            <div class="tab" onclick="switchShop('sell')">💰 Bán</div>
        </div>
        <div id="shop-content"></div>
    </div>

    <div id="v-bag" class="view">
        <div class="card">
            <h3>🎒 Túi đồ Bảo Hân</h3>
            <div id="bag-list"></div>
        </div>
    </div>

    <div id="info-popup">
        <h3 id="pop-title">Cây trồng</h3>
        <p id="pop-progress">Tiến độ: 0%</p>
        <p id="pop-status">Đang phát triển...</p>
        <button class="btn" style="width: 100%" onclick="closePop()">Đóng</button>
    </div>

    <nav>
        <div class="nav-item" onclick="showV('farm')">🏡<span>Trại</span></div>
        <div class="nav-item" onclick="showV('fish')">🐟<span>Câu</span></div>
        <div class="nav-item" onclick="showV('shop')">🏪<span>Chợ</span></div>
        <div class="nav-item" onclick="showV('bag')">🎒<span>Túi</span></div>
    </nav>

    <script>
        // --- ÂM THANH (AUDIO CONTEXT) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'click') { osc.type = 'sine'; osc.frequency.setValueAtTime(440, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
            if (type === 'success') { osc.type = 'square'; osc.frequency.setValueAtTime(523, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.2); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2); osc.start(); osc.stop(audioCtx.currentTime + 0.2); }
            if (type === 'fail') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.3); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3); osc.start(); osc.stop(audioCtx.currentTime + 0.3); }
        }

        // --- DỮ LIỆU ---
        const CROPS = {
            wheat: { name: "Lúa mì", icon: "🌾", seed: "🌱", time: 10, cost: 10, sell: 30, xp: 5 },
            corn: { name: "Ngô", icon: "🌽", seed: "🌿", time: 30, cost: 30, sell: 100, xp: 15 },
            strawberry: { name: "Dâu tây", icon: "🍓", seed: "☘️", time: 120, cost: 100, sell: 450, xp: 50 }
        };

        const FOOD = {
            burger: { name: "Burger Bò", nrg: 15, cost: 40 },
            sushi: { name: "Sushi Cá", nrg: 25, cost: 60 },
            energy: { name: "Nước tăng lực", nrg: 50, cost: 120 }
        };

        const FISH = {
            shrimp: { name: "Tôm", icon: "🦐", sell: 30 },
            fish: { name: "Cá lóc", icon: "🐟", sell: 70 },
            goldfish: { name: "Cá vàng", icon: "🐠", sell: 200 }
        };

        let state = {
            gold: 150, nrg: 30, lvl: 1, xp: 0,
            inv: { hoe: { dur: 20, max: 20 }, rod: { dur: 10, max: 10 } },
            bag: { wheat_seed: 2, corn_seed: 1 },
            storage: { wheat: 0, corn: 0, strawberry: 0, fish: 0, shrimp: 0, goldfish: 0 },
            tiles: Array(12).fill().map(() => ({ type: 'grass', crop: null, progress: 0, watered: false })),
            curTool: 'hoe',
            shopTab: 'seed',
            fishing: { step: 'idle', pointerPos: 0, dir: 1, targetRange: [35, 65] }
        };

        // --- LOGIC CHÍNH ---
        function init() {
            load();
            renderFarm();
            updateUI();
            setInterval(tick, 1000);
        }

        function tick() {
            state.tiles.forEach(t => {
                if (t.crop && t.watered && t.progress < 100) {
                    let rate = 100 / CROPS[t.crop].time;
                    t.progress = Math.min(100, t.progress + rate);
                }
            });
            if (state.fishing.step === 'minigame') moveFishPointer();
            renderFarm();
            save();
        }

        function renderFarm() {
            const grid = document.getElementById('farm-grid');
            grid.innerHTML = '';
            state.tiles.forEach((t, i) => {
                const el = document.createElement('div');
                el.className = `tile ${t.type === 'tilled' ? 'tilled' : ''} ${t.watered ? 'watered' : ''}`;
                el.onclick = () => handleTile(i);
                if (t.crop) {
                    el.innerHTML = `<span style="font-size:${t.progress >= 100 ? '30px':'20px'}">${t.progress < 100 ? CROPS[t.crop].seed : CROPS[t.crop].icon}</span>`;
                }
                grid.appendChild(el);
            });
        }

        function handleTile(i) {
            let t = state.tiles[i];
            
            // 1. Nếu có cây và không cầm liềm -> Xem tình trạng
            if (t.crop && state.curTool !== 'harvest') {
                showPop(i); return;
            }

            // 2. Dùng công cụ
            if (state.curTool === 'hoe' && t.type === 'grass') {
                if (state.inv.hoe.dur <= 0) { alert("Cuốc hỏng rồi, mua cái mới đi bà!"); return; }
                t.type = 'tilled'; state.inv.hoe.dur--; playSound('click');
            }
            else if (state.curTool === 'water' && t.type === 'tilled') { t.watered = true; playSound('click'); }
            else if (state.curTool.endsWith('_seed')) {
                let sId = state.curTool.replace('_seed', '');
                if (t.type === 'tilled' && !t.crop && state.bag[state.curTool] > 0) {
                    t.crop = sId; t.progress = 0; state.bag[state.curTool]--;
                }
            }
            else if (state.curTool === 'harvest' && t.crop && t.progress >= 100) {
                state.storage[t.crop]++;
                t.crop = null; t.progress = 0; t.watered = false;
                playSound('success');
            }
            
            renderFarm(); updateUI();
        }

        // --- CÂU CÁ 2.0 ---
        function handleFishClick() {
            if (!state.inv.rod || state.inv.rod.dur <= 0) { alert("Cần câu hỏng hoặc không có cần!"); return; }

            if (state.fishing.step === 'idle') {
                state.fishing.step = 'waiting';
                document.getElementById('fish-hint').innerText = "Đang chờ...";
                setTimeout(() => {
                    if (state.fishing.step === 'waiting') {
                        state.fishing.step = 'bite';
                        document.getElementById('fish-alert').style.display = 'block';
                        document.getElementById('fish-hint').innerText = "CÁ CẮN! CHẠM!";
                    }
                }, 2000 + Math.random() * 3000);
            } 
            else if (state.fishing.step === 'bite') {
                state.fishing.step = 'minigame';
                document.getElementById('fish-alert').style.display = 'none';
                document.getElementById('fish-bar-container').style.display = 'block';
                document.getElementById('fish-hint').innerText = "CHẠM KHI KIM Ở VÙNG XANH!";
            }
            else if (state.fishing.step === 'minigame') {
                let p = state.fishing.pointerPos;
                if (p >= 35 && p <= 65) {
                    let fIds = Object.keys(FISH);
                    let caught = fIds[Math.floor(Math.random() * fIds.length)];
                    state.storage[caught]++;
                    state.inv.rod.dur--;
                    playSound('success');
                    alert("Dính cá! Bắt được: " + FISH[caught].name);
                } else {
                    playSound('fail');
                    alert("Hụt rồi, tiếc quá!");
                }
                resetFish();
            }
        }

        function moveFishPointer() {
            state.fishing.pointerPos += (5 * state.fishing.dir);
            if (state.fishing.pointerPos >= 100 || state.fishing.pointerPos <= 0) state.fishing.dir *= -1;
            document.getElementById('fish-pointer').style.left = state.fishing.pointerPos + "%";
        }

        function resetFish() {
            state.fishing.step = 'idle';
            document.getElementById('fish-bar-container').style.display = 'none';
            document.getElementById('fish-hint').innerText = "Chạm để thả mồi";
            updateUI();
        }

        // --- UI & SHOP ---
        function switchShop(tab) { state.shopTab = tab; renderShop(); }

        function renderShop() {
            const content = document.getElementById('shop-content');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            let html = '';

            if (state.shopTab === 'seed') {
                for(let id in CROPS) {
                    html += `<div class="item-row"><span>${CROPS[id].icon} Hạt ${CROPS[id].name} (${CROPS[id].cost}💰)</span><button class="btn" onclick="buy('${id}_seed', ${CROPS[id].cost})">Mua</button></div>`;
                }
            } else if (state.shopTab === 'food') {
                for(let id in FOOD) {
                    html += `<div class="item-row"><span>${FOOD[id].name} (+${FOOD[id].nrg}⚡) - ${FOOD[id].cost}💰</span><button class="btn" onclick="buyFood('${id}')">Mua & Ăn</button></div>`;
                }
            } else if (state.shopTab === 'tool') {
                html += `<div class="item-row"><span>⛏️ Mua Cuốc mới (50💰)</span><button class="btn" onclick="buyTool('hoe', 50)">Mua</button></div>`;
                html += `<div class="item-row"><span>🎣 Mua Cần câu mới (100💰)</span><button class="btn" onclick="buyTool('rod', 100)">Mua</button></div>`;
            } else if (state.shopTab === 'sell') {
                for(let id in state.storage) {
                    if (state.storage[id] > 0) {
                        let p = CROPS[id] ? CROPS[id].sell : FISH[id].sell;
                        html += `<div class="item-row"><span>${id} x${state.storage[id]}</span><button class="btn" onclick="sell('${id}', ${p})">Bán hết (+${state.storage[id]*p}💰)</button></div>`;
                    }
                }
            }
            content.innerHTML = html || "Trống rỗng...";
        }

        function renderBag() {
            const list = document.getElementById('bag-list');
            let html = '';
            for (let id in state.bag) {
                if (state.bag[id] > 0) {
                    html += `<div class="item-row"><span>${id.replace('_', ' ')} x${state.bag[id]}</span><button class="btn" onclick="selectT('${id}')">Sử dụng</button></div>`;
                }
            }
            list.innerHTML = html || "Túi rỗng";
        }

        function buy(id, price) { if(state.gold >= price) { state.gold -= price; state.bag[id] = (state.bag[id]||0)+1; updateUI(); renderShop(); } }
        function buyFood(id) { if(state.gold >= FOOD[id].cost) { state.gold -= FOOD[id].cost; state.nrg = Math.min(30, state.nrg + FOOD[id].nrg); updateUI(); playSound('success'); } }
        function buyTool(type, price) { if(state.gold >= price) { state.gold -= price; state.inv[type] = {dur: type==='hoe'?20:10, max: type==='hoe'?20:10}; updateUI(); renderShop(); } }
        function sell(id, price) { state.gold += state.storage[id] * price; state.storage[id] = 0; updateUI(); renderShop(); }

        function selectT(t) { state.curTool = t; document.getElementById('cur-tool-name').innerText = t; showV('farm'); }

        function updateUI() {
            document.getElementById('m-gold').innerText = state.gold;
            document.getElementById('m-nrg').innerText = state.nrg;
            document.getElementById('m-lvl').innerText = state.lvl;
            document.getElementById('dur-hoe').style.width = (state.inv.hoe.dur / state.inv.hoe.max * 100) + "%";
            document.getElementById('rod-status').innerText = state.inv.rod.dur > 0 ? `Cần câu: Độ bền ${state.inv.rod.dur}/${state.inv.rod.max}` : "Cần câu đã hỏng!";
        }

        function showV(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
            document.getElementById('v-'+id).classList.add('active-view');
            if(id === 'shop') renderShop();
            if(id === 'bag') renderBag();
        }

        function showPop(i) {
            let t = state.tiles[i];
            document.getElementById('pop-title').innerText = CROPS[t.crop].name;
            document.getElementById('pop-progress').innerText = `Tiến độ: ${Math.floor(t.progress)}%`;
            document.getElementById('pop-status').innerText = t.watered ? "Cây đang phát triển tốt ✨" : "Cây bị khô, hãy tưới nước! 🌵";
            document.getElementById('info-popup').style.display = 'block';
        }
        function closePop() { document.getElementById('info-popup').style.display = 'none'; }

        function save() { localStorage.setItem('minefarm_ultra_v2', JSON.stringify(state)); }
        function load() { let s = localStorage.getItem('minefarm_ultra_v2'); if(s) state = JSON.parse(s); }

        init();
    </script>
</body>
</html>

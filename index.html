<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MineFarm: Pro Max Ultra Edition</title>
    <style>
        :root{
            --primary:#4cd137;
            --bg:#f5f6fa;
            --dark:#2f3640;
            --gold:#fbc531;
            --danger:#e84118;
            --blue:#00a8ff;
            --cozy-1:#6f4e37;
        }

        *{box-sizing:border-box}

        body{
            margin:0;
            padding:0;
            background:linear-gradient(180deg,#79c7ff 0%,#dff3ff 32%,#f4efe6 100%);
            font-family:'Segoe UI',sans-serif;
            overflow:hidden;
            user-select:none;
            touch-action:manipulation;
            color:#1f1f1f;
        }

        #stat-bar{
            background:rgba(31,24,20,.9);
            color:#fff;
            height:66px;
            display:flex;
            justify-content:space-around;
            align-items:center;
            border-bottom:4px solid var(--gold);
            font-size:14px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        #stat-bar span{ display:inline-flex; align-items:center; gap:4px; }

        .view{
            display:none;
            height:calc(100vh - 136px);
            overflow-y:auto;
            padding:14px;
            background:rgba(255,255,255,.1);
        }

        .active-view{ display:block; animation:fadeIn .2s ease-out; }
        @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

        .card{
            background:rgba(255,255,255,.95);
            border-radius:18px;
            padding:14px;
            margin-bottom:12px;
            border:2px solid rgba(47,54,64,.1);
            box-shadow:0 4px 12px rgba(0,0,0,.05);
        }

        .btn{
            background:var(--primary);
            color:#fff;
            border:none;
            padding:10px 14px;
            border-radius:12px;
            font-weight:700;
            box-shadow:0 4px #3b8f28;
            transition:transform .05s;
        }
        .btn:active{transform:translateY(2px);box-shadow:none}
        .btn.secondary{background:#f0f0f0;color:#222;box-shadow:0 4px #c8c8c8}
        .btn.warn{background:var(--gold);color:#352100;box-shadow:0 4px #d49f00}
        .btn.danger{background:var(--danger);box-shadow:0 4px #b02f0d}

        /* FARM GRID */
        #farm-grid{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:8px;
            max-width:360px;
            margin:auto;
        }
        .tile{
            aspect-ratio:1/1;
            background:#57c84d;
            border-radius:8px;
            border-bottom:4px solid #2d5a27;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:20px;
        }
        .tile.tilled{ background:#9f6a3a; border-bottom-color: #5d3d22; }
        .tile.watered{ box-shadow:inset 0 0 10px #1db0ff; }

        /* STATUS TABLE */
        .status-table {
            width: 100%;
            font-size: 11px;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .status-table th { text-align: left; opacity: 0.6; }
        .status-table td { padding: 4px 0; border-bottom: 1px solid #eee; }

        /* FISHING */
        #fish-area{
            height:200px;
            background:linear-gradient(180deg,#12a4ff 0%,#0078cb 100%);
            border-radius:20px;
            position:relative;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            overflow:hidden;
        }
        #fish-bar-container{
            width:90%;
            height:30px;
            background:rgba(0,0,0,0.3);
            border-radius:15px;
            margin-top:20px;
            position:relative;
            display:none;
            border:2px solid #fff;
        }
        #fish-target{
            position:absolute;
            height:100%;
            width:20%;
            background:var(--primary);
            left:40%;
            border-radius:10px;
            opacity: 0.8;
        }
        #fish-pointer{
            position:absolute;
            height:100%;
            width:12px;
            background:white;
            left:0%;
            border-radius: 5px;
            box-shadow: 0 0 10px white;
        }

        /* QUESTS */
        .quest-card {
            border-left: 4px solid var(--blue);
            padding-left: 10px;
            margin-bottom: 8px;
        }
        .quest-done { opacity: 0.5; text-decoration: line-through; border-left-color: #ccc; }

        .shop-tabs{ display:flex; gap:6px; overflow-x:auto; padding-bottom:10px; }
        .tab{ background:#eee; padding:7px 14px; border-radius:12px; font-size:12px; white-space:nowrap; }
        .tab.active{ background:var(--gold); font-weight:700; }

        #toast{
            position:fixed; left:50%; bottom:100px; transform:translateX(-50%);
            background:rgba(0,0,0,0.8); color:#fff; padding:8px 16px;
            border-radius:20px; font-size:12px; opacity:0; z-index:2000;
        }

        nav{
            position:fixed; bottom:0; width:100%; height:70px;
            background:#fff; display:flex; justify-content:space-around;
            align-items:center; border-top:3px solid var(--dark);
        }
        .nav-item{ font-size:22px; text-align:center; }
        .nav-item span{ display:block; font-size:10px; font-weight:800; }
    </style>
</head>
<body>

    <div id="stat-bar">
        <span>💰 <span id="m-gold">150</span></span>
        <span>⚡ <span id="m-nrg">30</span>/30</span>
        <span>⭐ Lv. <span id="m-lvl">1</span></span>
    </div>

    <div id="v-farm" class="view active-view">
        <div class="card">
            <div id="farm-grid"></div>
        </div>
        <div class="card">
            <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:6px;">
                <button class="btn" onclick="selectT('hoe')">⛏️ Cuốc (1⚡)</button>
                <button class="btn" onclick="selectT('water')">💧 Tưới (1⚡)</button>
                <button class="btn" onclick="selectT('harvest')">🧺 Thu hoạch (1⚡)</button>
            </div>
            <p style="text-align:center;font-size:12px;margin:8px 0 0 0;">Đang dùng: <b id="cur-tool-name">Cuốc</b></p>
        </div>
        <div class="card">
            <h4>📊 Trạng thái cây trồng</h4>
            <table class="status-table">
                <thead><tr><th>Ô</th><th>Cây</th><th>Tiến độ</th><th>Nước</th></tr></thead>
                <tbody id="status-body"></tbody>
            </table>
        </div>
    </div>

    <div id="v-fish" class="view">
        <div id="fish-area" onclick="handleFishClick()">
            <div id="fish-alert" style="font-size:50px;display:none;">❗</div>
            <div id="bobber" style="font-size:40px;">🎣</div>
            <p id="fish-hint" style="color:white;font-weight:800;">Chạm để thả mồi (2⚡)</p>
            <div id="fish-bar-container">
                <div id="fish-target"></div>
                <div id="fish-pointer"></div>
            </div>
        </div>
    </div>

    <div id="v-quest" class="view">
        <div class="card">
            <h3>📜 Nhiệm vụ chính</h3>
            <div id="main-quests"></div>
        </div>
        <div class="card">
            <h3>📌 Nhiệm vụ phụ</h3>
            <div id="sub-quests"></div>
        </div>
    </div>

    <div id="v-shop" class="view">
        <div class="shop-tabs">
            <div class="tab active" onclick="switchShop('seed')">🌱 Hạt</div>
            <div class="tab" onclick="switchShop('food')">🍔 Thức ăn</div>
            <div class="tab" onclick="switchShop('decor')">🪑 Nội thất</div>
            <div class="tab" onclick="switchShop('sell')">💰 Bán</div>
        </div>
        <div id="shop-content"></div>
    </div>

    <div id="v-bag" class="view">
        <div class="card">
            <h3>🎒 Túi đồ</h3>
            <div id="bag-list"></div>
        </div>
        <div class="card">
            <h3>📦 Kho nông sản</h3>
            <div id="storage-list"></div>
        </div>
    </div>

    <div id="toast"></div>

    <nav>
        <div class="nav-item" onclick="showV('farm')">🏡<span>Trại</span></div>
        <div class="nav-item" onclick="showV('fish')">🐟<span>Câu</span></div>
        <div class="nav-item" onclick="showV('quest')">📜<span>Nhiệm vụ</span></div>
        <div class="nav-item" onclick="showV('shop')">🏪<span>Chợ</span></div>
        <div class="nav-item" onclick="showV('bag')">🎒<span>Túi</span></div>
    </nav>

    <script>
        const CROPS = {
            wheat: { name: 'Lúa mì', icon: '🌾', seed: '🌱', time: 10, cost: 10, sell: 25, xp: 5 },
            corn: { name: 'Ngô', icon: '🌽', seed: '🌿', time: 20, cost: 25, sell: 65, xp: 12 },
            carrot: { name: 'Cà rốt', icon: '🥕', seed: '🥕', time: 15, cost: 15, sell: 40, xp: 8 }
        };

        const FOOD = {
            bread: { name: 'Bánh mì', nrg: 10, cost: 20 },
            energy_drink: { name: 'Nước tăng lực', nrg: 30, cost: 80 }
        };

        const DECOR = {
            bed: { name: 'Giường êm', icon: '🛏️', cost: 200 },
            table: { name: 'Bàn gỗ', icon: '🪑', cost: 150 },
            sofa: { name: 'Sofa đỏ', icon: '🛋️', cost: 300 },
            bookshelf: { name: 'Kệ sách', icon: '📚', cost: 180 },
            lamp: { name: 'Đèn đứng', icon: '💡', cost: 90 },
            fridge: { name: 'Tủ lạnh', icon: '🧊', cost: 500 },
            rug: { name: 'Thảm trải', icon: '🧶', cost: 70 },
            tv: { name: 'Tivi 4K', icon: '📺', cost: 600 },
            plant: { name: 'Chậu cây', icon: '🪴', cost: 50 },
            mirror: { name: 'Gương lớn', icon: '🪞', cost: 120 },
            window: { name: 'Cửa sổ', icon: '🪟', cost: 150 },
            clock: { name: 'Đồng hồ', icon: '⏰', cost: 80 },
            laptop: { name: 'Laptop Aceer', icon: '💻', cost: 1000 },
            painting: { name: 'Tranh ảnh', icon: '🖼️', cost: 200 }
        };

        const FISH_DATA = ['🐟', '🐠', '🐡', '🦐', '🦀'];

        let state = {
            gold: 150, nrg: 30, lvl: 1, xp: 0,
            inv: { hoe: 1, rod: 1 },
            bag: { wheat_seed: 3 },
            storage: {},
            tiles: Array(12).fill(null).map(() => ({ type: 'grass', crop: null, progress: 0, watered: false })),
            curTool: 'hoe',
            fishing: { step: 'idle', pos: 0, dir: 1 },
            quests: [
                { id: 'm1', title: 'Nông dân tập sự', desc: 'Thu hoạch 3 lúa mì', goal: 3, type: 'wheat', count: 0, reward: 50, done: false, category: 'main' },
                { id: 's1', title: 'Tay câu chuyên nghiệp', desc: 'Câu được 2 con cá', goal: 2, type: 'fish', count: 0, reward: 30, done: false, category: 'sub' }
            ]
        };

        function init() {
            renderAll();
            setInterval(tick, 100);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = 1;
            setTimeout(() => t.style.opacity = 0, 2000);
        }

        function useNrg(amt) {
            if (state.nrg >= amt) {
                state.nrg -= amt;
                updateStats();
                return true;
            }
            showToast("⚠️ Hết năng lượng! Hãy ăn gì đó.");
            return false;
        }

        function tick() {
            // Cập nhật cây trồng (chạy mỗi 100ms nên chia cho 10)
            state.tiles.forEach(t => {
                if (t.crop && t.watered && t.progress < 100) {
                    t.progress += (10 / CROPS[t.crop].time);
                    if (t.progress > 100) t.progress = 100;
                }
            });
            if (state.fishing.step === 'minigame') moveFishPointer();
            renderFarmStatus();
        }

        function renderAll() {
            updateStats();
            renderFarm();
            renderQuests();
        }

        function updateStats() {
            document.getElementById('m-gold').innerText = state.gold;
            document.getElementById('m-nrg').innerText = state.nrg;
            document.getElementById('m-lvl').innerText = state.lvl;
        }

        function renderFarm() {
            const grid = document.getElementById('farm-grid');
            grid.innerHTML = '';
            state.tiles.forEach((t, i) => {
                const el = document.createElement('div');
                el.className = `tile ${t.type === 'tilled' ? 'tilled' : ''} ${t.watered ? 'watered' : ''}`;
                el.onclick = () => handleTile(i);
                if (t.crop) el.innerHTML = t.progress >= 100 ? CROPS[t.crop].icon : CROPS[t.crop].seed;
                grid.appendChild(el);
            });
        }

        function renderFarmStatus() {
            const body = document.getElementById('status-body');
            let html = '';
            state.tiles.forEach((t, i) => {
                if (t.type === 'tilled') {
                    html += `<tr>
                        <td>#${i+1}</td>
                        <td>${t.crop ? CROPS[t.crop].name : 'Đất trống'}</td>
                        <td>${Math.floor(t.progress)}%</td>
                        <td>${t.watered ? '✅' : '❌'}</td>
                    </tr>`;
                }
            });
            body.innerHTML = html || '<tr><td colspan="4">Chưa có đất canh tác</td></tr>';
        }

        function handleTile(i) {
            const t = state.tiles[i];
            if (state.curTool === 'hoe' && t.type === 'grass') {
                if (useNrg(1)) { t.type = 'tilled'; renderFarm(); }
            } else if (state.curTool === 'water' && t.type === 'tilled' && !t.watered) {
                if (useNrg(1)) { t.watered = true; renderFarm(); }
            } else if (state.curTool.endsWith('_seed')) {
                const cId = state.curTool.replace('_seed', '');
                if (t.type === 'tilled' && !t.crop && state.bag[state.curTool] > 0) {
                    if (useNrg(1)) {
                        t.crop = cId; t.progress = 0; state.bag[state.curTool]--;
                        renderFarm(); renderBag();
                    }
                }
            } else if (state.curTool === 'harvest' && t.crop && t.progress >= 100) {
                if (useNrg(1)) {
                    state.storage[t.crop] = (state.storage[t.crop] || 0) + 1;
                    checkQuest(t.crop);
                    t.crop = null; t.watered = false; t.progress = 0;
                    renderFarm();
                }
            }
        }

        function handleFishClick() {
            if (state.fishing.step === 'idle') {
                if (!useNrg(2)) return;
                state.fishing.step = 'waiting';
                document.getElementById('fish-hint').innerText = "Đang chờ...";
                setTimeout(() => {
                    if (state.fishing.step === 'waiting') {
                        state.fishing.step = 'bite';
                        document.getElementById('fish-alert').style.display = 'block';
                    }
                }, 1000 + Math.random() * 2000);
            } else if (state.fishing.step === 'bite') {
                state.fishing.step = 'minigame';
                document.getElementById('fish-alert').style.display = 'none';
                document.getElementById('fish-bar-container').style.display = 'block';
            } else if (state.fishing.step === 'minigame') {
                const p = state.fishing.pos;
                if (p >= 40 && p <= 60) {
                    const f = FISH_DATA[Math.floor(Math.random() * FISH_DATA.length)];
                    state.storage['fish'] = (state.storage['fish'] || 0) + 1;
                    showToast("Bạn đã câu được cá! " + f);
                    checkQuest('fish');
                } else {
                    showToast("Hụt rồi!");
                }
                resetFish();
            }
        }

        function moveFishPointer() {
            // Thanh trượt nhanh từ trái sang phải mượt mà
            state.fishing.pos += (4 * state.fishing.dir);
            if (state.fishing.pos >= 100 || state.fishing.pos <= 0) state.fishing.dir *= -1;
            document.getElementById('fish-pointer').style.left = state.fishing.pos + '%';
        }

        function resetFish() {
            state.fishing.step = 'idle';
            state.fishing.pos = 0;
            document.getElementById('fish-bar-container').style.display = 'none';
            document.getElementById('fish-hint').innerText = "Chạm để thả mồi (2⚡)";
        }

        function renderQuests() {
            const mainBox = document.getElementById('main-quests');
            const subBox = document.getElementById('sub-quests');
            mainBox.innerHTML = ''; subBox.innerHTML = '';

            state.quests.forEach(q => {
                const html = `<div class="quest-card ${q.done ? 'quest-done' : ''}">
                    <b>${q.title}</b><br><small>${q.desc} (${q.count}/${q.goal})</small><br>
                    <small>Thưởng: ${q.reward}💰</small>
                </div>`;
                if (q.category === 'main') mainBox.innerHTML += html;
                else subBox.innerHTML += html;
            });
        }

        function checkQuest(type) {
            state.quests.forEach(q => {
                if (!q.done && q.type === type) {
                    q.count++;
                    if (q.count >= q.goal) {
                        q.done = true;
                        state.gold += q.reward;
                        showToast("Hoàn thành nhiệm vụ: " + q.title);
                        updateStats();
                    }
                }
            });
            renderQuests();
        }

        function switchShop(t) {
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            renderShop(t);
        }

        function renderShop(type = 'seed') {
            const content = document.getElementById('shop-content');
            let html = '<div class="card">';
            if (type === 'seed') {
                for (let id in CROPS) html += `<div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span>${CROPS[id].icon} ${CROPS[id].name} (${CROPS[id].cost}💰)</span>
                    <button class="btn" onclick="buy('seed','${id}')">Mua</button>
                </div>`;
            } else if (type === 'decor') {
                for (let id in DECOR) html += `<div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span>${DECOR[id].icon} ${DECOR[id].name} (${DECOR[id].cost}💰)</span>
                    <button class="btn" onclick="buy('decor','${id}')">Mua</button>
                </div>`;
            } else if (type === 'food') {
                for (let id in FOOD) html += `<div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span>${FOOD[id].name} (+${FOOD[id].nrg}⚡ - ${FOOD[id].cost}💰)</span>
                    <button class="btn" onclick="buy('food','${id}')">Ăn</button>
                </div>`;
            } else if (type === 'sell') {
                for (let id in state.storage) {
                    if (state.storage[id] > 0) html += `<div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <span>${id} x${state.storage[id]}</span>
                        <button class="btn warn" onclick="sellItem('${id}')">Bán sạch</button>
                    </div>`;
                }
            }
            content.innerHTML = html + '</div>';
        }

        function buy(type, id) {
            const item = type === 'seed' ? CROPS[id] : (type === 'decor' ? DECOR[id] : FOOD[id]);
            if (state.gold >= item.cost) {
                state.gold -= item.cost;
                if (type === 'seed') state.bag[id + '_seed'] = (state.bag[id + '_seed'] || 0) + 1;
                else if (type === 'food') state.nrg = Math.min(30, state.nrg + item.nrg);
                else showToast("Đã mua nội thất: " + item.name);
                updateStats(); renderBag(); showToast("Giao dịch thành công!");
            } else showToast("Không đủ tiền!");
        }

        function sellItem(id) {
            const price = CROPS[id]?.sell || 40;
            state.gold += state.storage[id] * price;
            state.storage[id] = 0;
            updateStats(); renderShop('sell'); renderBag();
        }

        function renderBag() {
            const bag = document.getElementById('bag-list');
            bag.innerHTML = '';
            for (let id in state.bag) {
                if (state.bag[id] > 0) bag.innerHTML += `<div style="margin-bottom:5px;">${id} x${state.bag[id]} <button class="btn" onclick="selectT('${id}')">Dùng</button></div>`;
            }
            const storage = document.getElementById('storage-list');
            storage.innerHTML = '';
            for (let id in state.storage) {
                if (state.storage[id] > 0) storage.innerHTML += `<div>${id} x${state.storage[id]}</div>`;
            }
        }

        function selectT(t) {
            state.curTool = t;
            document.getElementById('cur-tool-name').innerText = t;
        }

        function showV(v) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active-view'));
            document.getElementById('v-' + v).classList.add('active-view');
            if (v === 'shop') renderShop();
            if (v === 'bag') renderBag();
        }

        init();
    </script>
</body>
</html>
